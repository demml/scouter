syntax = "proto3";

package scouter.grpc.v1;

service MessageService {
  rpc InsertMessage(InsertMessageRequest) returns (InsertMessageResponse);
}

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message InsertMessageRequest {
  bytes message_record = 1;
}

message InsertMessageResponse {
  string status = 1;
  string message = 2;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
  string status = 2;
  string message = 3;
}

message RefreshTokenRequest {
  string access_token = 1;
}

message RefreshTokenResponse {
  string token = 1;
  string status = 2;
  string message = 3;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool is_authenticated = 1;
  string status = 2;
  string message = 3;
}

// ── Dataset Service ─────────────────────────────────────────────────

service DatasetService {
  rpc RegisterDataset(RegisterDatasetRequest) returns (RegisterDatasetResponse);
  rpc InsertBatch(InsertBatchRequest) returns (InsertBatchResponse);
  rpc QueryDataset(QueryDatasetRequest) returns (QueryDatasetResponse);
}

message RegisterDatasetRequest {
  string catalog = 1;
  string schema_name = 2;
  string table = 3;
  string json_schema = 4;              // Pydantic JSON schema; server derives Arrow schema
  repeated string partition_columns = 5;
}

message RegisterDatasetResponse {
  string status = 1;                    // "created" | "already_exists"
  string fingerprint = 2;              // Server-computed; client caches for InsertBatch
}

message InsertBatchRequest {
  string catalog = 1;
  string schema_name = 2;
  string table = 3;
  bytes ipc_data = 4;                  // Arrow IPC stream bytes
  string fingerprint = 5;             // From RegisterDatasetResponse
}

message InsertBatchResponse {
  uint64 rows_accepted = 1;
}

message QueryDatasetRequest {
  string sql = 1;
}

message QueryDatasetResponse {
  bytes ipc_data = 1;                  // Arrow IPC stream bytes
}